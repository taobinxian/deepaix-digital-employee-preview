<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeepAIX 数字员工运行治理平台</title><style>body{margin:0;background:#f5f7fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}.app{display:flex;min-height:100vh}.side{width:230px;background:#0b1020;color:#cbd5e1;padding:24px 16px;position:fixed;inset:0 auto 0 0}.brand{color:white;font-size:24px;font-weight:800;margin-bottom:32px}.tag{display:inline-block;color:#06b6d4;background:#123456;border-radius:999px;font-size:12px;padding:6px 10px;margin-left:8px}.nav button{display:block;width:100%;border:0;background:transparent;color:#cbd5e1;text-align:left;padding:12px 16px;border-radius:12px;font-size:14px;cursor:pointer}.nav button.active{background:#1d2b4f;color:white;font-weight:800}.ver{position:absolute;bottom:28px;left:28px;color:#94a3b8;font-size:13px}.main{margin-left:230px;width:calc(100% - 230px)}.top{height:72px;background:white;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0}.top h1{font-size:24px;margin:0 0 4px}.top p{margin:0;color:#64748b;font-size:13px}.search{background:#f8fafc;border:1px solid #e5e7eb;border-radius:999px;padding:10px 18px;color:#64748b;font-size:13px}.content{padding:32px}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(5,1fr)}.two{grid-template-columns:2fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.half{grid-template-columns:1.2fr .8fr}.card{background:white;border:1px solid #e5e7eb;border-radius:20px;box-shadow:0 6px 16px rgba(15,23,42,.08);padding:24px}.metric .value{font-size:28px;font-weight:900;margin:8px 0}.sub{color:#64748b;font-size:13px}.blue{color:#2563eb}.green{color:#10b981}.amber{color:#f59e0b}.red{color:#ef4444}.purple{color:#8b5cf6}.cyan{color:#06b6d4}h2{margin:0 0 8px;font-size:18px}.table{width:100%;border-collapse:collapse;font-size:13px}.table th{background:#f8fafc;color:#64748b;text-align:left;padding:12px;border-bottom:1px solid #e5e7eb}.table td{padding:14px 12px;border-bottom:1px solid #e5e7eb;color:#334155}.table td:first-child{color:#111827;font-weight:800}.pill{display:inline-flex;min-width:64px;justify-content:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900}.ok{background:#ecfdf5;color:#10b981}.warn{background:#fffbeb;color:#f59e0b}.bad{background:#fef2f2;color:#ef4444}.info{background:#eff6ff;color:#2563eb}.purplep{background:#f5f3ff;color:#8b5cf6}.todo{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #e5e7eb}.dot{width:9px;height:9px;border-radius:50%;margin-top:7px;background:#2563eb}.todo strong{display:block;font-size:14px}.todo span{color:#64748b;font-size:12px}.btn{border:1px solid #e5e7eb;background:#f8fafc;border-radius:10px;padding:10px 14px;font-weight:800;color:#334155}.primary{border:0;background:#2563eb;color:white;border-radius:10px;padding:10px 16px;font-weight:800}.danger{background:#fef2f2;color:#ef4444;border-color:#fecaca}.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0}.note{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:16px;line-height:1.65}.event{display:grid;grid-template-columns:90px 1fr;gap:14px;padding:13px 0;position:relative}.event:before{content:'';position:absolute;left:77px;top:22px;width:9px;height:9px;border-radius:50%;background:#10b981}.event.warn:before{background:#f59e0b}.event.future:before{background:#94a3b8}.event .time{font-size:12px;color:#64748b;font-weight:900}.event p{margin:4px 0 0;color:#334155;font-size:12px}.tabs .tab{padding:14px 18px;border-radius:12px;margin-bottom:8px;color:#334155;font-weight:700}.tab.active{background:#eff6ff;color:#2563eb}.flow{display:flex;align-items:center;gap:16px;flex-wrap:wrap}.node,.mvp,.arch{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:16px}.node{width:160px}.arrow{font-size:28px;color:#2563eb;font-weight:900}.callout{border-radius:16px;padding:18px 22px;font-weight:900;line-height:1.6}@media(max-width:1100px){.stats,.three,.two,.half{grid-template-columns:1fr}.side{position:static;width:auto}.main{margin-left:0;width:100%}.app{display:block}}</style></head><body><div class="app"><aside class="side"><div class="brand">DeepAIX <span class="tag">数字员工</span></div><nav id="nav" class="nav"></nav><div class="ver">v0.2 运行治理版</div></aside><main class="main"><header class="top"><div><h1 id="title"></h1><p id="sub"></p></div><div class="search">搜索 Run / 员工 / 群</div></header><section class="content" id="content"></section></main></div><script>const $=s=>document.querySelector(s);const table=(h,r)=>'<table class="table"><thead><tr>'+h.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+r+'</tbody></table>';const screens=[{name:'运行控制台',key:'dashboard',sub:'围绕 employee_task_runs / employee_run_events 的运行事实源看板',html:`<div class="grid stats"><div class="card metric"><span>今日运行次数</span><div class="value">328</div><b class="blue">较昨日 +18%</b></div><div class="card metric"><span>成功率</span><div class="value">94.6%</div><b class="green">失败集中在 API 超时</b></div><div class="card metric"><span>等待审批</span><div class="value">12</div><b class="amber">高风险动作待确认</b></div><div class="card metric"><span>人工接管率</span><div class="value">6.8%</div><b class="purple">低于阈值 10%</b></div><div class="card metric"><span>平均耗时</span><div class="value">12.4s</div><b class="cyan">模型 8.1s / 工具 4.3s</b></div></div><div class="grid two" style="margin-top:24px"><div class="card"><h2>数字员工运行状态</h2><p class="sub">展示员工、渠道、成功率与异常数量，优先定位运行问题</p>${table(['数字员工','入口','状态','成功率','异常'],`<tr><td>研发日报助手</td><td>飞书群 / Cron</td><td><span class="pill ok">运行中</span></td><td>96%</td><td>2</td></tr><tr><td>项目会议纪要助手</td><td>飞书会议</td><td><span class="pill ok">正常</span></td><td>92%</td><td>1</td></tr><tr><td>运维告警解释助手</td><td>钉钉群</td><td><span class="pill warn">等待人工</span></td><td>88%</td><td>7</td></tr><tr><td>审批预审助手</td><td>飞书审批</td><td><span class="pill ok">正常</span></td><td>98%</td><td>0</td></tr>`)}</div><div class="card"><h2>待处理事项</h2><p class="sub">需要人工确认或接管的运行</p><div class="todo"><i class="dot" style="background:#f59e0b"></i><div><strong>高风险：发送外部客户邮件</strong><span>审批预审助手 · 2分钟前</span></div></div><div class="todo"><i class="dot" style="background:#ef4444"></i><div><strong>工具调用失败：Jira API 401</strong><span>研发日报助手 · 8分钟前</span></div></div><div class="todo"><i class="dot"></i><div><strong>告警解释置信度低</strong><span>运维值班员 · 12分钟前</span></div></div></div></div><div class="card" style="margin-top:24px"><h2>最近运行记录</h2><p class="sub">从 run 维度展示每次执行，而不是从聊天记录反推状态</p>${table(['Run ID','来源','状态','数字员工','风险','耗时','操作'],`<tr><td>RUN-10428</td><td>飞书群</td><td><span class="pill ok">成功</span></td><td>研发日报助手</td><td>低</td><td>9.8s</td><td>查看</td></tr><tr><td>RUN-10427</td><td>钉钉群</td><td><span class="pill bad">失败</span></td><td>运维告警解释助手</td><td>中</td><td>31.2s</td><td>重试</td></tr><tr><td>RUN-10426</td><td>飞书审批</td><td><span class="pill warn">待审批</span></td><td>审批预审助手</td><td>高</td><td>--</td><td>处理</td></tr>`)}</div>`},{name:'运行详情',key:'run',sub:'一次数字员工执行的完整链路：消息、路由、模型、工具、审批、回复、失败原因',html:`<div class="grid half"><div class="card"><h2>RUN-10426 · 审批预审助手</h2><p><span class="pill warn">waiting_approval</span> <span class="pill bad">risk: high</span> <span class="pill info">飞书审批</span></p><p class="sub">用户：王工｜来源：飞书审批｜触发：approval_event｜创建时间：2026-05-16 09:34:21</p><div class="toolbar"><button class="primary">批准继续</button><button class="btn">转人工</button><button class="btn danger">取消运行</button></div></div><div class="card"><h2 class="amber">等待审批</h2><p class="sub">累计耗时 18.4s</p><b class="red">高风险动作：即将把预审意见写回审批评论，需要审批人确认。</b></div></div><div class="grid half" style="margin-top:24px"><div class="card"><h2>运行事件时间线</h2>${['09:34:21|inbound_received|收到飞书审批事件，提取审批单 ID 与申请人','09:34:22|employee_resolved|匹配到审批预审助手','09:34:23|prompt_built|加载制度知识库与历史审批上下文','09:34:26|model_started|调用 Claude CLI，生成预审建议','09:34:31|tool_call|调用 policy_search 检索制度条款','09:34:35|approval_requested|检测到写回评论动作，进入人工确认','--|reply_sent|等待审批完成后发送结果卡片'].map((x,i)=>{let a=x.split('|');return '<div class="event '+(i==5?'warn':i==6?'future':'')+'"><div class="time">'+a[0]+'</div><div><b>'+a[1]+'</b><p>'+a[2]+'</p></div></div>'}).join('')}</div><div class="card"><h2>输入与输出预览</h2><b>原始输入</b><div class="note">审批单：低空设备采购申请，需要判断预算和供应商资质是否合规。</div><br><b>待发送回复</b><div class="note" style="background:#fffbeb">建议补充供应商资质证明，并标注预算科目。</div></div></div>`},{name:'员工配置',key:'employee',sub:'知识库、工具权限、入口与审批策略配置',html:`<div class="grid half"><div class="card tabs"><h2>研发日报助手</h2><p><span class="pill ok">启用中</span> <span class="pill info">P0 试点</span></p>${['基础信息','行为设定','知识绑定','工具权限','渠道入口','审批策略'].map((x,i)=>'<div class="tab '+(i==2?'active':'')+'">'+x+'</div>').join('')}</div><div class="card"><h2>知识绑定</h2><p class="sub">每个数字员工绑定可访问知识库，先少量、明确、可追踪</p>${table(['知识库','来源','状态','规模'],`<tr><td>研发项目知识库</td><td>Confluence / 飞书文档</td><td><span class="pill ok">已启用</span></td><td>23,418 chunks</td></tr><tr><td>发布流程规范</td><td>Markdown 文档</td><td><span class="pill ok">已启用</span></td><td>1,234 chunks</td></tr><tr><td>低空系统接口文档</td><td>Git 仓库</td><td><span class="pill warn">待重建索引</span></td><td>9,812 chunks</td></tr>`)}<h2 style="margin-top:28px">工具权限</h2>${table(['工具','权限','风险','用途'],`<tr><td>git_activity_read</td><td>只读</td><td><span class="pill ok">低风险</span></td><td>日报统计</td></tr><tr><td>report_send_to_group</td><td>写入</td><td><span class="pill warn">中风险</span></td><td>发送日报到群</td></tr><tr><td>production_deploy_trigger</td><td>写入</td><td><span class="pill bad">高风险</span></td><td>需要主管审批</td></tr>`)}</div></div>`},{name:'渠道接入',key:'channel',sub:'飞书 / 钉钉 / Email 统一入口治理',html:`<div class="grid two"><div class="card"><h2>飞书接入</h2>${table(['配置项','值','状态'],`<tr><td>机器人 App ID</td><td>cli_a9f***</td><td><span class="pill ok">已连接</span></td></tr><tr><td>事件订阅</td><td>message / approval / doc_update</td><td><span class="pill ok">启用</span></td></tr><tr><td>卡片回调</td><td>/api/channels/feishu/card</td><td><span class="pill ok">启用</span></td></tr>`)}</div><div class="card"><h2>钉钉接入</h2>${table(['配置项','值','状态'],`<tr><td>机器人 Code</td><td>robot_lowaltitude</td><td><span class="pill ok">已连接</span></td></tr><tr><td>回调地址</td><td>/api/channels/dingtalk/callback</td><td><span class="pill ok">启用</span></td></tr><tr><td>组织同步</td><td>部门、人员、角色、主管链</td><td><span class="pill info">每日 03:00</span></td></tr>`)}</div></div><div class="card" style="margin-top:24px"><h2>入口路由与回调链路</h2><div class="flow"><div class="node"><b>IM 消息</b><br><span>@机器人 / 单聊</span></div><div class="arrow">→</div><div class="node"><b>事件回调</b><br><span>审批 / 卡片按钮</span></div><div class="arrow">→</div><div class="node"><b>Employee Router</b><br><span>解析 employee_id</span></div><div class="arrow">→</div><div class="node"><b>Run Service</b><br><span>创建 run + event</span></div><div class="arrow">→</div><div class="node"><b>Runtime</b><br><span>模型 / 工具 / RAG</span></div></div></div>`},{name:'审批接管',key:'approval',sub:'高风险动作进入确认或审批，低置信度进入人工接管',html:`<div class="card"><h2>处理队列</h2><div class="toolbar"><button class="primary">全部</button><button class="btn">待审批 12</button><button class="btn">待接管 8</button><button class="btn">失败重试 5</button></div></div><div class="grid two" style="margin-top:24px"><div class="card"><h2>待审批任务</h2>${table(['任务','员工','风险','等待','操作'],`<tr><td>写回审批评论</td><td>审批预审助手</td><td><span class="pill bad">高</span></td><td>14m</td><td>处理</td></tr><tr><td>发送研发日报到全员群</td><td>研发日报助手</td><td><span class="pill warn">中</span></td><td>8m</td><td>处理</td></tr>`)}</div><div class="card"><h2>审批卡片预览</h2><div class="note"><h2>高风险动作确认 <span class="pill bad">risk: high</span></h2><p><b>数字员工：</b>审批预审助手</p><p><b>动作：</b>将预审意见写回飞书审批评论。</p><div class="toolbar"><button class="primary">同意执行</button><button class="btn danger">驳回</button><button class="btn">转人工</button></div></div></div></div>`},{name:'审计日志',key:'audit',sub:'按 run/event 记录用户、模型、工具、审批人与外部系统动作',html:`<div class="card"><h2>审计范围</h2><span class="pill info">用户输入</span> <span class="pill purplep">模型输出</span> <span class="pill ok">工具参数</span> <span class="pill warn">审批记录</span> <span class="pill bad">错误堆栈</span></div><div class="card" style="margin-top:24px"><h2>审计事件列表</h2>${table(['时间','Run ID','事件','Actor','对象','摘要','结果'],`<tr><td>09:34:35</td><td>RUN-10426</td><td>approval_requested</td><td>system</td><td>飞书审批</td><td>请求审批人确认写回审批评论</td><td><span class="pill warn">等待</span></td></tr><tr><td>09:34:31</td><td>RUN-10426</td><td>tool_call</td><td>tool</td><td>policy_search</td><td>检索采购制度，命中 3 条政策</td><td><span class="pill ok">成功</span></td></tr>`)}</div>`},{name:'运行治理架构',key:'arch',sub:'DeepAIX v0.2 先做 Employee Operations Layer',html:`<div class="card"><h2>Employee Operations Layer</h2>${['飞书 / 钉钉 / Email｜消息、审批、卡片按钮、Webhook、Cron','Channel Adapter｜验签、去重、事件标准化、文本/卡片发送','Employee Router｜按 @、robotCode、邮件地址、群白名单解析员工','EmployeeRunService｜创建 employee_task_runs，追加 employee_run_events，维护状态','EmployeeRuntime｜构建 Prompt，调用模型，触发 RAG / MCP / Business App','Channel Reply / Card｜结果消息、审批卡片、人工接管卡片、失败通知'].map(x=>'<div class="arch"><b>'+x.split('｜')[0]+'</b><br><span class="sub">'+x.split('｜')[1]+'</span></div>').join('<div style="text-align:center;color:#2563eb;font-weight:900">↓</div>')}<div class="grid two"><div class="note" style="background:#eff6ff;color:#2563eb">新增表：employee_task_runs / employee_run_events</div><div class="note" style="background:#f5f3ff;color:#8b5cf6">保留表：employee_conversations 继续做聊天留痕</div></div></div>`},{name:'MVP 页面范围',key:'mvp',sub:'第一阶段只做能支撑运行闭环的页面',html:`<div class="card"><h2>P0 可交付页面</h2><div class="grid three">${[['控制台','任务成功率、异常、待审批、人工接管'],['运行列表','run 状态、来源、员工、风险、耗时'],['运行详情','事件时间线、工具调用、输入输出、审批'],['员工配置','知识绑定、工具权限、渠道入口、审批策略'],['渠道接入','飞书/钉钉机器人、回调、群白名单'],['审计日志','actor、event_type、payload、外部 ID']].map(x=>'<div class="mvp"><h2>'+x[0]+'</h2><p class="sub">'+x[1]+'</p></div>').join('')}</div><div class="callout" style="margin-top:24px;background:#13213c;color:white">后置能力：数字员工市场、完整流程画布、多模型路由、成本自动优化、复杂 DSL。</div></div>`}];function render(i){[...$('#nav').children].forEach((b,j)=>b.classList.toggle('active',i===j));$('#title').textContent=screens[i].name;$('#sub').textContent=screens[i].sub;$('#content').innerHTML=screens[i].html;location.hash=screens[i].key}screens.forEach((s,i)=>{let b=document.createElement('button');b.textContent=s.name;b.onclick=()=>render(i);$('#nav').appendChild(b)});render(Math.max(0,screens.findIndex(s=>s.key===location.hash.slice(1))));</script></body></html>
